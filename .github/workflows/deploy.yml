name: Deploy a Producción — InvPatrimonio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: 🔒 Activar modo mantenimiento
        run: |
          sudo touch /var/www/html/en_mantenimiento.lock
          echo "✅ Página de mantenimiento activada"

      - name: Asegurar permisos
        run: |
          sudo chown -R oliver:oliver /var/www/siaf-patrimonio || true

      - name: Respaldar SQLite antes de desplegar
        run: |
          sudo mkdir -p /var/www/backups/siaf-patrimonio
          if [ -f /var/www/siaf-patrimonio/server/data/audit.db ]; then
            ts=$(date +%Y%m%d_%H%M%S)
            sudo cp /var/www/siaf-patrimonio/server/data/audit.db "/var/www/backups/siaf-patrimonio/audit_${ts}.db"
            echo "✅ Backup creado: /var/www/backups/siaf-patrimonio/audit_${ts}.db"
          else
            echo "⚠️ No existe audit.db para respaldar"
          fi

      - name: Desplegar archivos con rsync
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='client/node_modules' \
            --exclude='server/data/' \
            --exclude='server/uploads/' \
            --exclude='server/logs/' \
            . /var/www/siaf-patrimonio/

      - name: Validar integridad de SQLite persistente
        run: |
          DB="/var/www/siaf-patrimonio/server/data/audit.db"

          if [ ! -f "$DB" ]; then
            echo "❌ No existe $DB"
            exit 1
          fi

          size=$(stat -c%s "$DB")
          if [ "$size" -le 0 ]; then
            echo "❌ $DB está vacío (${size} bytes)"
            exit 1
          fi

          if ! command -v sqlite3 >/dev/null 2>&1; then
            echo "⚠️ sqlite3 no está disponible para validar tablas; continúa solo con validación de tamaño"
            exit 0
          fi

          has_table=$(sqlite3 "$DB" "SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='item_estados';")
          if [ "$has_table" != "1" ]; then
            echo "❌ Falta tabla crítica item_estados en $DB"
            exit 1
          fi

          echo "✅ SQLite OK: $DB (${size} bytes), tabla item_estados presente"

      - name: Instalar dependencias del servidor
        run: |
          cd /var/www/siaf-patrimonio/server
          npm install --production

      - name: Construir Frontend (Client)
        run: |
          cd /var/www/siaf-patrimonio/client
          npm install
          CI=false npm run build

      - name: Restaurar .env desde Backup (si no existe)
        run: |
          if [ ! -f /var/www/siaf-patrimonio/server/.env ]; then
            cp /var/www/.env.siaf-patrimonio /var/www/siaf-patrimonio/server/.env
            echo "⚠️ .env restaurado desde backup"
          fi

      - name: Ejecutar migraciones pendientes (patrimonio_db)
        run: |
          sudo -u postgres psql -d patrimonio_db -c "CREATE TABLE IF NOT EXISTS migrations_log (filename TEXT PRIMARY KEY, executed_at TIMESTAMP DEFAULT NOW());"

          for file in /var/www/siaf-patrimonio/server/database/migrations/*.sql; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            already_run=$(sudo -u postgres psql -d patrimonio_db -tAc "SELECT COUNT(*) FROM migrations_log WHERE filename='$filename'")

            if [ "$already_run" -eq "0" ]; then
              echo "▶ Ejecutando migración: $filename"
              sudo -u postgres psql -d patrimonio_db -f "$file"
              sudo -u postgres psql -d patrimonio_db -c "INSERT INTO migrations_log (filename) VALUES ('$filename')"
              echo "✅ $filename ejecutada"
            else
              echo "⏭ $filename ya ejecutada, saltando"
            fi
          done

      - name: Permisos Nginx
        run: |
          sudo chown -R www-data:www-data /var/www/siaf-patrimonio/client/build

      - name: Reiniciar Servidor con PM2
        run: |
          cd /var/www/siaf-patrimonio/server
          pm2 restart siaf-patrimonio --update-env || pm2 start src/index.js --name "siaf-patrimonio"
          pm2 save
          echo "🚀 Despliegue finalizado con éxito"

      - name: 🟢 Desactivar modo mantenimiento
        if: always()
        run: |
          sudo rm -f /var/www/html/en_mantenimiento.lock
          echo "✅ Sistema online"
